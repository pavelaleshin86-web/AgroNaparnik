services:
  - type: web
    name: agronaparnik
    runtime: python
    plan: starter
    buildCommand: ./build.sh
    startCommand: bash start.sh
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: SQLITE_DB_NAME
        value: data/db.sqlite3
      - key: CONTACT_NOTIFY_EMAIL
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "465"
      - key: EMAIL_USE_SSL
        value: "1"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
    disk:
      name: agronaparnik-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
